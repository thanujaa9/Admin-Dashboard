<div class="sidebar">
  <div class="sidebar-header">
    <mat-icon class="logo-icon">dashboard</mat-icon>
    <span class="logo-text">AdminPanel</span>
  </div>

  <div class="user-info">
    <div class="avatar">{{ user?.name?.charAt(0) | uppercase }}</div>
    <div class="user-details">
      <span class="user-name">{{ user?.name }}</span>
      <span class="user-role">{{ user?.role | titlecase }}</span>
    </div>
  </div>

  <nav class="nav-menu">
    
      <a *ngFor="let item of menuItems"
      class="nav-item"
      [class.active]="isActive(item.route)"
      (click)="router.navigate([item.route])"
    >
      <mat-icon>{{ item.icon }}</mat-icon>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <a class="nav-item logout" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </a>
  </div>
</div>
